<!DOCTYPE html>
<html lang="ja">
<head>
<title>蝕花の残影ギミック補助</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body { font-family: sans-serif; padding: 20px; background: #eeeeee; }

  #resetBtn, #undoBtn {
    padding: 12px 20px;
    font-size: 1.2em;
    font-weight: bold;
    border: 3px solid #cc3300;
    background: #ff9966;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 10px;
  }

  #guess { display: none; }

  #result {
    margin-top: 20px;
    white-space: pre-wrap;
  }

  .grid-input {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    width: 422px;
    margin-top: 10px;
  }

  .grid-candidate {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 10px;
  }

  .link-cell {
    border: 2px solid #444;
    padding: 8px 12px;
    border-radius: 6px;
    background: #ccccff;
    min-width: 70px;
    text-align: center;
    cursor: pointer;
    white-space: nowrap;
    font-size: 0.8em;
    font-weight: bold;
   }

  .cell {
    border: 2px solid #444;
    padding: 8px 12px;
    border-radius: 6px;
    background: #f5f5f5;
    min-width: 70px;
    text-align: center;
    cursor: pointer;
    white-space: nowrap;
    font-size: 1.4em;
    font-weight: bold;
  }

  .cell.selected-guess {
    background: #ffe5cc;
    border-color: #ff9933;
  }

  .cell.history-guess {
    background: #552255;
    border-color: #e6b800;
  }

  /* 破綻候補を塗りつぶす */
  .cell.not-candidate {
    background: #552255;
    border-color: #000000;
  }

  .hit-grid {
    display: flex;
    gap: 10px;
    margin-top: 10px;
  }

  .hit-cell {
    border: 2px solid #444;
    padding: 8px 12px;
    border-radius: 6px;
    background: #fafafa;
    min-width: 40px;
    text-align: center;
    cursor: pointer;
    white-space: nowrap;
    font-size: 1.4em;
    font-weight: bold;
  }

  .hit-cell.selected {
    background: #cce5ff;
    border-color: #3399ff;
  }

  .top-buttons {
  display: flex: 0 0 auto;
  flex-wrap: nowrap;
  gap: 10px;
  align-items: center;
}

  /* スマホ最適化 */
  @media (max-width: 600px) {

    #resetBtn,
    #undoBtn {
      font-size: 0.9em;
      padding: 8px 12px;
    }

    .grid-input,
    .grid-candidate {
      width: 100% !important;
      gap: 6px;
    }

    .cell {
      min-width: 18vw !important;
      padding: 4px 0;
      font-size: 1.0em;
    }

    .hit-cell {
      min-width: 14vw !important;
      padding: 4px 0;
      font-size: 1.0em;
    }
  }
</style>
</head>
<body>

<div class="top-buttons">
  <button id="resetBtn">リセット</button>
  <button id="undoBtn">一つ戻る</button>

  <div class="link-cell" onclick="location.href='instruction.html'"
       style="cursor:pointer; display:inline-block;">
    指示モードへ<br>切り替え
  </div>
</div>

<h3>推測コードを選択：</h3>
<div id="inputGrid" class="grid-input"></div>

<input id="guess" maxlength="4" readonly>

<h3>正解数：</h3>
<div id="hitGrid" class="hit-grid"></div>

<div id="result"></div>

<script>
// 16通りの全候補
const initialCandidates = [
  "1111","1112","1121","1122",
  "1211","1212","1221","1222",
  "2111","2112","2121","2122",
  "2211","2212","2221","2222"
];

let candidates = [...initialCandidates];
let guessValue = "";
let historyGuesses = [];
let history = [];
let stateHistory = [];

// 状態保存
function saveState() {
  stateHistory.push({
    candidates: [...candidates],
    guessValue: guessValue,
    historyGuesses: [...historyGuesses],
    history: JSON.parse(JSON.stringify(history)),
    selectedHit: document.querySelector(".hit-cell.selected")?.textContent || null
  });
}

// Undo
function undo() {
  if (stateHistory.length === 0) return;

  const prev = stateHistory.pop();

  candidates = [...prev.candidates];
  guessValue = prev.guessValue;
  historyGuesses = [...prev.historyGuesses];
  history = JSON.parse(JSON.stringify(prev.history));

  document.getElementById("guess").value = guessValue;

  document.querySelectorAll("#inputGrid .cell").forEach(c => {
    c.classList.remove("selected-guess", "history-guess", "not-candidate");
    if (c.textContent === guessValue) {
      c.classList.add("selected-guess");
    } else if (historyGuesses.includes(c.textContent)) {
      c.classList.add("history-guess");
    }
  });

  document.querySelectorAll(".hit-cell").forEach(c => c.classList.remove("selected"));
  if (prev.selectedHit !== null) {
    document.querySelectorAll(".hit-cell").forEach(c => {
      if (c.textContent === prev.selectedHit) c.classList.add("selected");
    });
  }

  updateResult();
}

// 推測コード選択
function selectCell(value) {
  saveState();

  guessValue = value;
  document.getElementById("guess").value = value;

  document.querySelectorAll(".hit-cell").forEach(c => c.classList.remove("selected"));

  document.querySelectorAll("#inputGrid .cell.selected-guess").forEach(c => {
    c.classList.remove("selected-guess");
    c.classList.add("history-guess");
    if (!historyGuesses.includes(c.textContent)) {
      historyGuesses.push(c.textContent);
    }
  });

  document.querySelectorAll("#inputGrid .cell").forEach(c => {
    if (c.textContent === value) {
      c.classList.add("selected-guess");
      c.classList.remove("history-guess");
    }
  });

  updateResult();
}

// 入力セル生成
function createInputGrid() {
  const grid = document.getElementById("inputGrid");
  grid.innerHTML = "";
  initialCandidates.forEach(c => {
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = c;
    div.addEventListener("click", () => selectCell(c));
    grid.appendChild(div);
  });
}

// 正解数セル生成
function createHitGrid() {
  const grid = document.getElementById("hitGrid");
  grid.innerHTML = "";

  for (let i = 0; i <= 4; i++) {
    const div = document.createElement("div");
    div.className = "hit-cell";
    div.textContent = i;

    div.addEventListener("click", () => {
      saveState();
      document.querySelectorAll(".hit-cell").forEach(c => c.classList.remove("selected"));
      div.classList.add("selected");

      history.push({ guess: guessValue, hit: i });

      applyHitFilter();
    });

    grid.appendChild(div);
  }
}

// 一致数計算
function countHit(a, b) {
  let h = 0;
  for (let i = 0; i < 4; i++) {
    if (a[i] === b[i]) h++;
  }
  return h;
}

// 累積フィルタ方式
function applyHitFilter() {
  candidates = [...initialCandidates];

  history.forEach(h => {
    candidates = candidates.filter(code => countHit(code, h.guess) === h.hit);
  });

  updateResult();
}

// 候補外セルを塗りつぶす
function updateCellColors() {
  document.querySelectorAll("#inputGrid .cell").forEach(c => {
    const code = c.textContent;

    c.classList.remove("not-candidate");

    if (!candidates.includes(code)) {
      c.classList.add("not-candidate");
    }
  });
}

// 結果表示
function updateResult() {
  const result = document.getElementById("result");

  if (candidates.length === 1) {
    const c = candidates[0];
    result.innerHTML =
      "<h3>確定：</h3>" +
      `<div id="candidateGrid" class="grid-candidate"></div>`;

    const cg = document.getElementById("candidateGrid");
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = c;
    div.addEventListener("click", () => selectCell(c));
    cg.appendChild(div);

    updateCellColors();
    return;
  }

  result.innerHTML =
    "<h3>現在の候補 (" + candidates.length + "件):</h3>" +
    `<div id="candidateGrid" class="grid-candidate"></div>`;

  const cg = document.getElementById("candidateGrid");
  candidates.forEach(c => {
    const div = document.createElement("div");
    div.className = "cell";
    div.textContent = c;
    div.addEventListener("click", () => selectCell(c));
    cg.appendChild(div);
  });

  updateCellColors();
}

// リセット
document.getElementById("resetBtn").onclick = () => {
  candidates = [...initialCandidates];
  guessValue = "";
  historyGuesses = [];
  history = [];
  stateHistory = [];

  document.getElementById("guess").value = "";
  document.querySelectorAll(".hit-cell").forEach(c => c.classList.remove("selected"));
  document.querySelectorAll("#inputGrid .cell").forEach(c => {
    c.classList.remove("selected-guess", "history-guess", "not-candidate");
  });

  updateResult();
};

document.getElementById("undoBtn").onclick = undo;

// 初期化
createInputGrid();
createHitGrid();
updateResult();
</script>

<hr noshade size="1">
<div align="right">
  蝕花の残影ギミック補助:

</div>

</body>
</html>
